<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跨平台遊戲設計師 (iPad + PC)</title>
<style>
  body { font-family: "微軟正黑體", sans-serif; background-color: #f0f4f8; padding: 20px; }
  .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  h1 { color: #2c3e50; text-align: center; }
  .instruction { background-color: #e8f4fd; padding: 15px; border-left: 5px solid #3498db; margin-bottom: 20px; color: #555; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
  select, input, textarea { width: 100%; padding: 10px; border: 2px solid #bdc3c7; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
  
  button { width: 100%; padding: 15px; font-size: 18px; cursor: pointer; border: none; border-radius: 10px; background-color: #27ae60; color: white; margin-top: 10px;}
  button:hover { background-color: #219150; }
  
  #result-area { display: none; margin-top: 20px; padding: 15px; background: #eee; border-radius: 10px; }
  #final-prompt { white-space: pre-wrap; font-family: monospace; background: #fff; padding: 10px; border: 1px solid #ccc; }
</style>
</head>
<body>

<div class="container">
  <h1>🎮 跨平台遊戲指令生成器</h1>
  <div class="instruction">
    這個工具會幫你寫出「電腦」和「iPad」都能玩的遊戲指令！請填寫下方內容：
  </div>

  <div class="form-group">
    <label>1. 遊戲名稱：</label>
    <input type="text" id="gameName" placeholder="例如：超級接蘋果">
  </div>

  <div class="form-group">
    <label>2. 操控方式 (重要！決定了 iPad 怎麼玩)：</label>
    <select id="controlType">
      <option value="follow">A. 跟隨手指/滑鼠移動 (最推薦，如：接東西、打磚塊)</option>
      <option value="tap">B. 點擊螢幕/按空白鍵 (適合：跳躍遊戲、發射子彈)</option>
      <option value="dpad">C. 上下左右控制 (AI 會幫你畫虛擬按鈕，如：貪吃蛇)</option>
    </select>
  </div>

  <div class="form-group">
    <label>3. 玩法與規則：</label>
    <textarea id="gameRule" style="height:100px;" placeholder="例如：控制籃子接住掉下來的蘋果，接到加分，漏接扣分。"></textarea>
  </div>

  <button onclick="generatePrompt()">✨ 產生雙平台通用指令</button>

  <div id="result-area">
    <h3>👇 複製這段給 AI：</h3>
    <div id="final-prompt"></div>
    <button style="background-color:#3498db" onclick="copyText()">📋 一鍵複製</button>
  </div>
</div>

<script>
  function generatePrompt() {
    const name = document.getElementById('gameName').value;
    const type = document.getElementById('controlType').value;
    const rule = document.getElementById('gameRule').value;

    let techSpec = "";
    
    // 根據選擇的操控方式，自動植入對應的技術指令
    if(type === "follow") {
      techSpec = "操控需求：電腦版請跟隨滑鼠 X 軸移動；手機/iPad 版請跟隨手指觸摸的位置移動 (Touch Event)。";
    } else if (type === "tap") {
      techSpec = "操控需求：電腦版按下空白鍵或滑鼠觸發動作；手機/iPad 版點擊螢幕任何位置皆可觸發動作。";
    } else if (type === "dpad") {
      techSpec = "操控需求：電腦版使用鍵盤方向鍵；手機/iPad 版請在畫面左下角繪製半透明的「虛擬方向鍵 (On-screen Arrow Buttons)」來控制上下左右。";
    }

    const template = `**角色：** 前端遊戲開發專家
**任務：** 製作一個 RWD 響應式網頁遊戲，必須同時支援 PC 與 iPad。

**遊戲內容：**
1. 名稱：${name}
2. 玩法：${rule}

**技術規格 (Cross-Platform Requirement)：**
1. **${techSpec}** (這點最重要)
2. **畫面適配：** 遊戲畫面 (Canvas) 必須自動縮放以填滿螢幕寬度，但保持比例。
3. **防止誤觸：** 請在 CSS 加入 'touch-action: none;' 以防止在 iPad 上玩遊戲時畫面產生捲動或縮放。
4. **單一檔案：** 請將 HTML, CSS, JS 整合在同一個檔案中。
5. **程式碼品質：** 確保程式碼完整，並加上清楚的中文註解。`;

    document.getElementById('final-prompt').innerText = template;
    document.getElementById('result-area').style.display = 'block';
  }

  function copyText() {
    navigator.clipboard.writeText(document.getElementById('final-prompt').innerText).then(() => {
      alert("複製成功！");
    });
  }
</script>

</body>
</html>
